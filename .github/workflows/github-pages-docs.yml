name: Generate and Deploy GitHub Pages Docs

on:
  push:
    branches:
      - main
      - new-tui-frontend  # Track feature development branches seamlessly
  workflow_dispatch:      # Allows you to trigger this documentation build manually via the UI

# Sets specific secure permissions for the native GitHub token layer to publish updates
permissions:
  contents: read
  pages: write
  id-token: write

# Allows one concurrent deployment at a time to prevent conflicting pipeline update requests
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository Base
        uses: actions/checkout@v4

      - name: Configure Python Environment Engine
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute Project Structural Map Engine
        run: |
          echo "Executing native script mapping out the repository files..."
          python scripts/generate_repo_map.py

      - name: Initialize Pages Artifact Staging Area
        uses: actions/configure-pages@v4

      - name: Upload Finished Static Documentation Dashboard
        uses: actions/upload-pages-artifact@v3
        with:
          # Target only the root folder containing the newly built index.html
          path: '.'

      - name: Deploy Live Portal to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
