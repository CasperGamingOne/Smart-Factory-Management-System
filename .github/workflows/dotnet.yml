name: .NET Basic Autotest

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  issues: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    # Add the C# warning → error matcher
    - name: Enable C# Warning Matcher
      run: echo "::add-matcher::.github/matchers/csharp-warnings.json"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0'

    - name: Restore dependencies
      run: dotnet restore 2>&1 | tee build.log

    - name: Build project
      run: dotnet build --no-restore --configuration Release 2>&1 | tee -a build.log

    - name: Run Tests
      run: dotnet test --no-build --configuration Release --verbosity normal 2>&1 | tee -a build.log

    # Upload log as artifact so the issue action can attach it
    - name: Upload build log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Failed Build Issue
      if: failure()
      uses: jayqi/failed-build-issue-action@v1
      with:
        title: "Build or Test Failure (Warnings Included)"
        body: |
          The build or tests failed due to errors or warnings treated as errors.

          ### Build Log
          The full build log is attached as an artifact named **build-log**.
