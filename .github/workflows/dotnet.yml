# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Basic Autotest

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  issues: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0' 

    - name: Restore dependencies
      run: dotnet restore

# 1. Run build, log to file, and catch exit status safely
    - name: Build with dotnet
      id: dotnet_build
      run: |
        set -o pipefail
        if ! dotnet build --no-restore 2>&1 | tee build_log.txt; then
          echo "build_outcome=failed" >> $GITHUB_OUTPUT
        else
          echo "build_outcome=success" >> $GITHUB_OUTPUT
        fi

    # 2. Parse logs (Runs ALWAYS)
    - name: Analyze Build Logs
      id: log_analysis
      if: always()
      run: |
        if [ "${{ steps.dotnet_build.outputs.build_outcome }}" = "failed" ]; then
          echo "status=failed" >> $GITHUB_OUTPUT
          echo "title=❌ Build Failed on ${{ github.sha }}" >> $GITHUB_OUTPUT
          tail -n 25 build_log.txt > issue_body.txt
                
        elif grep -q "warning CS" build_log.txt; then
          echo "status=warning" >> $GITHUB_OUTPUT
          echo "title=⚠️ Build completed with warnings on ${{ github.sha }}" >> $GITHUB_OUTPUT
          grep "warning CS" build_log.txt | head -n 25 > issue_body.txt
                
        else
          echo "status=success" >> $GITHUB_OUTPUT
        fi

    # 3. Create the issue if status is 'failed' or 'warning'
    - name: Create Issue on Warning or Failure
      if: always() && (steps.log_analysis.outputs.status == 'failed' || steps.log_analysis.outputs.status == 'warning')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh issue create \
          --title "${{ steps.log_analysis.outputs.title }}" \
          --body-file issue_body.txt \
          --label "bug"

    # 4. Explicitly fail the workflow at the very end if the build originally failed
    - name: Finalize Workflow Status
      if: always() && steps.dotnet_build.outputs.build_outcome == 'failed'
      run: |
        echo "Failing workflow because the dotnet build step failed."
        exit 1
